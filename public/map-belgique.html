      // ── Scales ─────────────────────────────────────────────────────
      const maxVal = d3.max(DATA, (d) => d.Nombre);
      const rScale = d3.scaleSqrt().domain([1, maxVal]).range([5, 58]);
      const opacityScale = d3
        .scaleLinear()
        .domain([1, maxVal])
        .range([0.42, 0.8]);

      // ── Tooltip ────────────────────────────────────────────────────
      const tooltip = document.getElementById("tooltip");
      function showTip(e, d) {
        tooltip.style.display = "block";
        tooltip.innerHTML = `<strong>${d.Commune}</strong>${d.Nombre} bien${d.Nombre > 1 ? "s" : ""} vendu${d.Nombre > 1 ? "s" : ""}`;
        moveTip(e);
      }
      function moveTip(e) {
        tooltip.style.left = e.clientX + 16 + "px";
        tooltip.style.top = e.clientY - 12 + "px";
      }
      function hideTip() {
        tooltip.style.display = "none";
      }

      // ── Rendu ──────────────────────────────────────────────────────
      (function init() {
        const EXTENT = [
          [40, 30],
          [980, 710],
        ];
        const proj = d3.geoMercator().fitExtent(EXTENT, PROVINCES);
        const path = d3.geoPath().projection(proj);

        d3.select("#geo-fills")
          .selectAll("path")
          .data(PROVINCES.features)
          .enter()
          .append("path")
          .attr("class", "province-fill")
          .attr("d", path);

        d3.select("#geo-lines")
          .selectAll("path")
          .data(PROVINCES.features)
          .enter()
          .append("path")
          .attr("class", "province-line")
          .attr("d", path);

        const sorted = [...DATA].sort((a, b) => a.Longitude - b.Longitude);
        const g = d3.select("#bubble-layer");

        sorted.forEach((d, i) => {
          const pt = proj([d.Longitude, d.Latitude]);
          if (!pt || isNaN(pt[0]) || isNaN(pt[1])) return;

          g.append("circle")
            .attr("class", "bubble")
            .attr("cx", pt[0])
            .attr("cy", pt[1])
            .attr("r", 0)
            .attr("fill", "#29b6d4")
            .attr("fill-opacity", 0)
            .attr("stroke", "#55d8ee")
            .attr("stroke-width", d.Nombre > 10 ? 1.0 : 0.7)
            .attr("stroke-opacity", 0)
            .on("mouseover", (e) => showTip(e, d))
            .on("mousemove", moveTip)
            .on("mouseout", hideTip)
            .transition()
            .delay(i * 130)
            .duration(380)
            .ease(d3.easeElasticOut.amplitude(1).period(0.5))
            .attr("r", rScale(d.Nombre))
            .attr("fill-opacity", opacityScale(d.Nombre))
            .attr("stroke-opacity", 0.75);
        });
      })();
